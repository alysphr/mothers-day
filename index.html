<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Special Surprise</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display&display=swap" rel="stylesheet">
    
    <style>
        body {
            background-color: #fceef0; /* Light pink background */
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Playfair Display', serif;
        }

        /* STAGE 1: ENVELOPE */
        #envelope-stage {
            text-align: center;
            cursor: pointer;
            transition: transform 0.3s;
        }
        #envelope-stage:hover { transform: scale(1.05); }
        .env-img { width: 320px; filter: drop-shadow(0 10px 20px rgba(0,0,0,0.15)); }
        .tap-text { font-size: 1.2rem; color: #b0413e; margin-top: 15px; animation: blink 2s infinite; }

        /* STAGE 2: THE PAPER CARD */
        #card-stage {
            display: none;
            width: 90%;
            max-width: 420px;
            height: 580px;
            background-image: url('paper.jpg'); /* Your paper reference */
            background-size: 100% 100%;
            padding: 40px 30px;
            box-sizing: border-box;
            position: relative;
            box-shadow: 0 20px 50px rgba(0,0,0,0.25);
            animation: slideUp 1s ease-out;
            border-radius: 10px;
        }

        .cursive-header {
            font-family: 'Great Vibes', cursive;
            font-size: 3rem;
            color: #b0413e;
            text-align: center;
            margin: 30px 0 10px 0;
        }

        .message-box {
            height: 320px;
            overflow-y: auto;
            font-size: 1.1rem;
            line-height: 1.6;
            color: #333;
            padding-right: 10px;
            white-space: pre-wrap; /* Keeps paragraph breaks */
        }

        /* STAGE 3: THE FLOWER */
        #flower-img {
            display: none;
            position: absolute;
            bottom: 10px;
            left: -40px; /* Positioned to the left as requested */
            width: 180px;
            transform: rotate(-15deg); /* Rotated for harmonization */
            z-index: 100;
        }

        /* Animations */
        @keyframes blink { 0%, 100% {opacity: 1;} 50% {opacity: 0.3;} }
        @keyframes slideUp { from { transform: translateY(100vh); } to { transform: translateY(0); } }
        
        /* Hide Scrollbar */
        .message-box::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <!-- CLICKABLE ENVELOPE -->
    <div id="envelope-stage" onclick="openSurprise()">
        <img src="envelope.png" class="env-img">
        <p class="tap-text">CLICK TO OPEN ✨</p>
    </div>

    <!-- THE VIRTUAL CARD -->
    <div id="card-stage">
        <div class="cursive-header">Happy Mother's Day</div>
        <div class="message-box" id="letter-content">
            <!-- Message injected by JS -->
        </div>
        <img id="flower-img" src="flower.png">
    </div>

    <audio id="bg-music" src="music.mp3"></audio>

    <script>
        // --- DATA SECTION: EDIT YOUR MESSAGES HERE ---
        const messages = {
            "mom": "Dearest Mom,\n\nYou are the heart of this family. Thank you for everything you do. I hope you love this little digital gift I made for you!\n\nWith love, [Your Name]",
            
            "auntie-marie": "Hi Auntie Marie!\n\nHappy Mother's Day to one of the most caring women I know. Thank you for always being there and for the wisdom you share. Enjoy your special day!\n\nLove, [Your Name]",
            
            "ate-joy": "To my dearest Ate Joy,\n\nYou are an amazing mother and an even better sister. Watching you grow into this role has been a joy. Happy Mother's Day!\n\nLove, [Your Name]"
        };

        function openSurprise() {
            // 1. Get ID from link (?to=ate-joy)
            const params = new URLSearchParams(window.location.search);
            const person = params.get('to') || "mom";

            // 2. Play Music
            const music = document.getElementById('bg-music');
            music.play();

            // 3. Swap Stages
            document.getElementById('envelope-stage').style.display = "none";
            document.getElementById('card-stage').style.display = "block";

            // 4. Set Text
            document.getElementById('letter-content').innerText = messages[person] || messages["mom"];

            // 5. Flower Timer (5 Seconds)
            setTimeout(() => {
                const flower = document.getElementById('flower-img');
                flower.style.display = "block";
                flower.style.animation = "fadeIn 2s ease";
            }, 5000);
        }
    </script>
</body>
</html>
