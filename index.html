<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mother's Day Surprise</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display&display=swap" rel="stylesheet">
    
    <style>
        /* Version 2.1 - Forced Layout Update */
        :root {
            --pink-bg: #fff0f3;
            --vintage-red: #b0413e;
            --paper-shadow: rgba(0,0,0,0.2);
        }

        * { box-sizing: border-box; }
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100vh;
            display: flex; justify-content: center; align-items: center;
            background-color: var(--pink-bg);
            overflow: hidden;
        }

        /* --- 1. CLEAN CSS ENVELOPE (No Images) --- */
        #envelope-wrapper {
            cursor: pointer;
            text-align: center;
            display: block;
        }
        .envelope {
            position: relative;
            width: 250px;
            height: 160px;
            background: var(--vintage-red);
            border-radius: 0 0 5px 5px;
            box-shadow: 0 10px 30px var(--paper-shadow);
        }
        .envelope::before {
            content: "";
            position: absolute;
            top: 0; left: 0;
            border-left: 125px solid transparent;
            border-right: 125px solid transparent;
            border-top: 90px solid #91312f;
        }
        .wax-seal {
            position: absolute;
            top: 70px; left: 105px;
            width: 40px; height: 40px;
            background: #d4af37;
            border-radius: 50%;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            display: flex; justify-content: center; align-items: center;
            color: #5c4300; font-size: 18px;
        }
        .click-me {
            font-family: 'Playfair Display', serif;
            color: var(--vintage-red);
            margin-top: 20px;
            font-weight: bold;
            animation: blink 2s infinite;
        }

        /* --- 2. ZOOMED OUT CARD & PUSHED TEXT --- */
        #card-stage {
            display: none;
            width: 350px; /* Zoomed out width */
            height: 500px; /* Zoomed out height */
            background-image: url('paper.jpg');
            background-size: 100% 100%;
            position: relative;
            padding: 30px;
            box-shadow: 0 20px 50px var(--paper-shadow);
            animation: slideUp 1s ease-out;
            overflow: visible; /* Allows flower to sit outside */
        }

        .happy-header {
            font-family: 'Great Vibes', cursive;
            font-size: 2.2rem;
            color: var(--vintage-red);
            text-align: center;
            margin: 10px 0;
        }

        .message-content {
            font-family: 'Playfair Display', serif;
            font-size: 0.9rem;
            color: #333;
            line-height: 1.5;
            height: 330px;
            overflow-y: auto;
            white-space: pre-wrap;
            /* PUSH TEXT TO THE RIGHT TO MAKE ROOM FOR FLOWER */
            padding-left: 45px; 
            padding-right: 5px;
            text-align: left;
        }

        /* --- 3. HARMONIZED FLOWER (Pushed Left) --- */
        #flower-img {
            display: none;
            position: absolute;
            bottom: 10px;
            left: -85px; /* Pushed far left away from text */
            width: 170px; /* Harmonized size */
            transform: rotate(-12deg);
            z-index: 100;
            filter: drop-shadow(5px 5px 15px rgba(0,0,0,0.1));
            pointer-events: none; /* Clicking flower won't block anything */
        }

        @keyframes blink { 0%, 100% {opacity: 1;} 50% {opacity: 0.3;} }
        @keyframes slideUp { from { transform: translateY(100vh); } to { transform: translateY(0); } }
        .message-content::-webkit-scrollbar { width: 0px; }
    </style>
</head>
<body>

    <div id="envelope-wrapper" onclick="openSurprise()">
        <div class="envelope">
            <div class="wax-seal">❤</div>
        </div>
        <p class="click-me">CLICK TO OPEN ✨</p>
    </div>

    <div id="card-stage">
        <h1 class="happy-header">Happy Mother's Day</h1>
        <div class="message-content" id="text-db"></div>
        <img id="flower-img" src="flower.png">
    </div>

    <audio id="music" src="music.mp3"></audio>

    <script>
        const letters = {
            "dins": "Thank you, Tita, for always being there, supporting us both silently and loudly. I know you’ve seen me po as an emotional kid since I was a young girl, but I don't think I’ve ever been vocal enough about how much I appreciate everything you’ve done for us, Tita. Thank you for your never-ending care, for accepting us despite our differences, for always guiding us in the paths we take, and lastly, for being a mother to us.\n\nI will never forget all the advice you have given me, Tita. I’m forever grateful for you. Even though our Mama is in heaven, I never felt like I didn't have one because of you—because of the love you showed and made us feel. I love you, Tita. Happy Mother’s Day to our beautiful and kind Tita!\n\nLove, Alyssa",
            "emem": "Hello, Ate! Thank you so much po ate sa lahat, lagi niyo po kaming binibusog at inaalagaan tuwing nandyan po kami kasama niyo ate, super duper nag e-enjoy po ako na kasama kayo ate. thank you for always welcoming us ate, we love you ate! and lagi po namin kayo ma-mimiss mwa mwa\n\nLove, Alyssa",
            "vangie": "Thank you po tita Vangie for taking care and supporting us! Always take care tita! Happy Mother's Day po!\n\nLove, Alyssa",
            "agnes": "Tita Agnes, thank you po for showing your love for us through cooking delicious foods, binubusog niyo po kami ng pag mamahal niyo, Happy Mother's po Day Tita!\n\nLove, Alyssa",
            "teteng": "Happy Mother's Day po Mami Teteng! Thank you po for always welcoming us, lagi po kaming nag e-enjoy pag kasama po namin kayo!\n\nLove, Alyssa",
            "sugar": "Happy Mother's Day po Mami Sugar! Thank you for always welcoming us po!\n\nLove, Alyssa",
            "abby": "Happy Mother's Day Ate/Mami Abby! Thank you po for always welcoming us and sa mga masaya pong kwentuhan! Lagi po kaming nag e-enjoy!\n\nLove, Alyssa"
        };

        function openSurprise() {
            const to = new URLSearchParams(window.location.search).get('to') || "dins";
            document.getElementById('music').play();
            document.getElementById('envelope-wrapper').style.display = "none";
            document.getElementById('card-stage').style.display = "block";
            document.getElementById('text-db').innerText = letters[to] || "Happy Mother's Day!";

            setTimeout(() => {
                const f = document.getElementById('flower-img');
                f.style.display = "block";
                f.animate([{opacity: 0, transform: 'translateX(-20px) rotate(-20deg)'}, {opacity: 1, transform: 'translateX(0) rotate(-12deg)'}], {duration: 1000, fill:'forwards'});
            }, 5000);
        }
    </script>
</body>
</html>
